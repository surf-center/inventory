<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Margins</title>

  <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="manifest.json">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%}

    body{
      background:#f3f3f3;
      font-family:"Poppins",sans-serif;
      overflow-y:auto;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:calc(env(safe-area-inset-top) + 18px) 16px calc(env(safe-area-inset-bottom) + 18px);
    }

    .card{
      width:100%;
      max-width:420px;
      background:#fff;
      border:1px solid #e8e8e8;
      border-radius:16px;
      box-shadow:0 8px 24px rgba(0,0,0,.06);
      padding:18px;
    }

    .logo{display:flex;justify-content:center;padding:6px 0 12px}
    .logo img{width:min(320px,86vw);height:auto;display:block}

    .section{display:flex;flex-direction:column;gap:8px;padding:10px 0}
    .section + .section{border-top:1px solid #f1f1f1}

    .section-title{
      font-size:12px;
      font-weight:800;
      color:#111;
      opacity:1;
      letter-spacing:.02em;
      text-transform:none;
      margin-left:2px;
    }

    .row-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .price-stack{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .field{
      display:flex;
      flex-direction:column;
      border:1px solid #d8d8d8;
      border-radius:14px;
      background:#fff;
      overflow:hidden;
      min-height:64px;
      position:relative;
      transition:border-color .18s ease, box-shadow .18s ease, opacity .18s ease;
    }

    .field.main{
      border:2px solid #007bff;
      box-shadow:0 0 0 3px rgba(0,123,255,.08);
    }

    .field.hidden{display:none !important}

    .field-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      width:100%;
      background:#fff;
      padding:6px 12px 14px;
      gap:3px;
      min-height:64px;
    }

    .value-wrap{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      justify-content:center;
      flex:1;
      min-width:0;
      gap:0;
    }

    .field-note{
      font-size:10px;
      font-weight:900;
      color:#111;
      opacity:1;
      line-height:1;
      text-transform:uppercase;
      letter-spacing:.03em;
      margin-top:-2px;
    }

    .affix{
      font-size:12px;
      font-weight:900;
      color:#111;
      opacity:1;
      min-width:10px;
      line-height:1;
      padding-top:5px;
      text-align:center;
      flex:0 0 10px;
    }

    .field input[type="number"],
    .field input[type="text"]{
      width:100%;
      min-width:0;
      border:none;
      outline:none;
      padding:0;
      font-size:24px;
      font-weight:900;
      color:#111;
      background:#fff;
      line-height:1;
      text-align:left;
      font-variant-numeric:tabular-nums;
      font-family:"Poppins",sans-serif;
    }

    .field input::placeholder{color:#b4b4b4}

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
    input[type="number"]{ -moz-appearance:textfield; appearance:textfield; }

    .price-meta{
      position:absolute;
      right:10px;
      top:50%;
      transform:translateY(-50%);
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:6px;
      padding:0;
      font-variant-numeric:tabular-nums;
      min-height:18px;
      visibility:hidden;
      opacity:0;
      transition:opacity .18s ease;
      pointer-events:none;
      max-width:45%;
    }

    .price-meta.show{
      visibility:visible;
      opacity:1;
    }

    .meta-current{
      display:none;
    }

    .meta-discounted{
      display:flex;
      align-items:flex-end;
      gap:2px;
      line-height:1;
      white-space:nowrap;
      color:#007bff;
      font-size:20px;
      font-weight:900;
    }

    .money-symbol,
    .bigprefix{
      font-size:11px;
      font-weight:900;
      line-height:1;
      opacity:1;
      color:inherit;
    }

    .money-value{font-size:1em;line-height:1}

    .discount-shell{display:none}
    .discount-shell.show{display:block}

    .discount-bar{
      display:grid;
      grid-template-columns:1fr;
      gap:8px;
      padding:8px;
      border:1px solid #d8d8d8;
      border-radius:14px;
      background:#fafafa;
    }

    .discount-row{
      display:grid;
      grid-template-columns:64px 1fr 1fr;
      gap:8px;
      align-items:center;
    }

    .discount-label{
      font-size:10px;
      font-weight:900;
      color:#111;
      opacity:1;
      text-transform:uppercase;
      letter-spacing:.03em;
      padding-left:2px;
    }

    .input{
      display:flex;
      align-items:center;
      border:1px solid #d8d8d8;
      border-radius:12px;
      background:#fff;
      min-height:40px;
      overflow:hidden;
      padding:0 10px;
      gap:6px;
    }

    .input .affix{
      padding-top:0;
      min-width:auto;
      flex:0 0 auto;
    }

    .input input{
      width:100%;
      min-width:0;
      border:none;
      outline:none;
      padding:8px 0;
      font-size:16px;
      font-weight:900;
      color:#111;
      background:#fff;
      line-height:1;
      text-align:left;
      font-variant-numeric:tabular-nums;
      font-family:"Poppins",sans-serif;
    }

    .summary{
      margin-top:12px;
      color:#111;
      background:transparent;
      padding:0;
    }

    .summary-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .pill{
      border-radius:14px;
      padding:0;
      background:transparent;
      border:none;
    }

    .pill .k{
      font-size:12px;
      opacity:1;
      color:#111;
      font-weight:800;
      margin-bottom:6px;
      letter-spacing:.02em;
      text-transform:none;
    }

    .biginput{
      display:flex;
      align-items:baseline;
      gap:4px;
      background:#fff;
      border:1px solid #d8d8d8;
      border-radius:14px;
      padding:10px 12px;
    }

    .biginput input{
      border:none;
      outline:none;
      background:transparent;
      color:#111;
      font-size:24px;
      font-weight:900;
      width:100%;
      padding:0;
      line-height:1.05;
      text-align:left;
      font-family:"Poppins",sans-serif;
    }

    .biginput input::placeholder{color:#b4b4b4}

    .toolbar{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .discount-toggle,
    .icon-btn{
      width:42px;
      height:42px;
      border:none;
      border-radius:999px;
      background:#f4f4f4;
      color:#666;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      flex:0 0 42px;
      transition:all .18s ease;
      border:1px solid #e3e3e3;
      font-family:"Poppins",sans-serif;
    }

    .discount-toggle{ font-size:16px; font-weight:900; }
    .discount-toggle:hover,.icon-btn:hover{ background:#ededed; color:#111; }
    .discount-toggle:active,.icon-btn:active{ transform:scale(.96) }
    .discount-toggle.active,.discount-toggle.has-value{ background:#eef5ff; color:#007bff; border-color:#d7e7ff; }

    .mode-switch{
      display:grid;
      grid-template-columns:1fr 1fr;
      background:#eef5ff;
      border:1px solid #d7e7ff;
      border-radius:999px;
      padding:4px;
      gap:4px;
      flex:1;
    }

    .mode-btn{
      appearance:none;
      border:none;
      background:transparent;
      color:#4b5b73;
      font-family:"Poppins",sans-serif;
      font-size:14px;
      font-weight:800;
      padding:10px 14px;
      border-radius:999px;
      cursor:pointer;
      transition:all .18s ease;
    }

    .mode-btn.active{ background:#007bff; color:#fff; box-shadow:0 4px 12px rgba(0,123,255,.18); }
    .icon-btn svg{ width:18px; height:18px; display:block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="logo.png" alt="Logo">
    </div>

    <div class="section">
      <div class="section-title">Purchase</div>
      <div class="price-stack" id="purchaseGrid">
        <div class="field main" id="purchaseExWrap">
          <div class="field-top">
            <div class="affix">€</div>
            <div class="value-wrap">
              <input type="number" id="purchaseEx" min="0" inputmode="decimal" placeholder="0" />
              <div class="field-note">Excl.</div>
            </div>
          </div>
          <div class="price-meta" id="purchaseExMeta">
            <span class="meta-current"><span class="money-symbol">€</span><span class="money-value"></span></span>
            <span class="meta-discounted"><span class="money-symbol">€</span><span class="money-value"></span></span>
          </div>
        </div>

        <div class="field" id="purchaseInWrap">
          <div class="field-top">
            <div class="affix">€</div>
            <div class="value-wrap">
              <input type="number" id="purchaseIn" min="0" inputmode="decimal" placeholder="0" />
              <div class="field-note">Incl.</div>
            </div>
          </div>
          <div class="price-meta" id="purchaseInMeta">
            <span class="meta-current"><span class="money-symbol">€</span><span class="money-value"></span></span>
            <span class="meta-discounted"><span class="money-symbol">€</span><span class="money-value"></span></span>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Selling</div>
      <div class="row-2" id="sellGrid">
        <div class="field main" id="sellInWrap">
          <div class="field-top">
            <div class="affix">€</div>
            <div class="value-wrap">
              <input type="number" id="sellIn" min="0" inputmode="decimal" placeholder="0" />
              <div class="field-note">Incl.</div>
            </div>
          </div>
          <div class="price-meta" id="sellInMeta">
            <span class="meta-current"><span class="money-symbol">€</span><span class="money-value"></span></span>
            <span class="meta-discounted"><span class="money-symbol">€</span><span class="money-value"></span></span>
          </div>
        </div>

        <div class="field" id="sellExWrap">
          <div class="field-top">
            <div class="affix">€</div>
            <div class="value-wrap">
              <input type="number" id="sellEx" min="0" inputmode="decimal" placeholder="0" />
              <div class="field-note">Excl.</div>
            </div>
          </div>
          <div class="price-meta" id="sellExMeta">
            <span class="meta-current"><span class="money-symbol">€</span><span class="money-value"></span></span>
            <span class="meta-discounted"><span class="money-symbol">€</span><span class="money-value"></span></span>
          </div>
        </div>
      </div>
    </div>

    <div class="section discount-shell" id="discountShell">
      <div class="section-title">Discount</div>
      <div class="discount-bar">
        <div class="discount-row">
          <div class="discount-label">Purchase</div>
          <div class="input">
            <div class="affix">%</div>
            <input type="number" id="pDiscPct" min="0" max="99" inputmode="decimal" placeholder="0" />
          </div>
          <div class="input">
            <div class="affix">€</div>
            <input type="number" id="pDiscEur" min="0" inputmode="decimal" placeholder="0" />
          </div>
        </div>

        <div class="discount-row">
          <div class="discount-label">Selling</div>
          <div class="input">
            <div class="affix">%</div>
            <input type="number" id="discPct" min="0" max="99" inputmode="decimal" placeholder="0" />
          </div>
          <div class="input">
            <div class="affix">€</div>
            <input type="number" id="discEur" min="0" inputmode="decimal" placeholder="0" />
          </div>
        </div>
      </div>
    </div>

    <div class="summary">
      <div class="summary-grid">
        <div class="pill">
          <div class="k">Margin</div>
          <div class="biginput">
            <span class="bigprefix">%</span>
            <input type="text" id="mPct" inputmode="decimal" />
          </div>
        </div>
        <div class="pill">
          <div class="k">Margin</div>
          <div class="biginput">
            <span class="bigprefix">€</span>
            <input type="text" id="mEur" inputmode="decimal" />
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="toolbar">
        <button type="button" class="discount-toggle" id="discountToggle" aria-label="Discount" title="Discount">%</button>

        <div class="mode-switch">
          <button type="button" class="mode-btn active" id="modeVat">Sales</button>
          <button type="button" class="mode-btn" id="modeMargin">Margin</button>
        </div>

        <button type="button" class="icon-btn" id="resetBtn" aria-label="Reset" title="Reset">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 6h18"></path>
            <path d="M8 6V4h8v2"></path>
            <path d="M19 6l-1 14H6L5 6"></path>
            <path d="M10 10v6"></path>
            <path d="M14 10v6"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    const VAT = 1.21;
    const STORAGE_KEY = "margins_tool_state_v13";
    const el = (id) => document.getElementById(id);

    const raw = (id) => el(id).value;
    const hasVal = (id) => raw(id).trim() !== "";
    const num = (id) => {
      const v = parseFloat(el(id).value);
      return Number.isFinite(v) ? v : null;
    };

    const floorOrEmpty = (v) => (v === null || v === "" || Number.isNaN(v)) ? "" : Math.floor(v);
    const ceilOrEmpty = (v) => (v === null || v === "" || Number.isNaN(v)) ? "" : Math.ceil(v);
    const setVal = (id, v) => { el(id).value = floorOrEmpty(v); };
    const setText = (id, v) => { el(id).value = v; };
    const clear = (ids) => ids.forEach(i => el(i).value = "");
    const clamp = (n, a, b) => Math.min(Math.max(n, a), b);

    let updating = false;
    let lastEdited = null;
    let marginLock = null;
    let taxMode = "vat";
    let discountManualOpen = false;

    function formatNum(v){ return String(Math.floor(Math.max(v || 0, 0))); }

    function setMeta(id, currentVal, discountedVal){
      const node = el(id);
      const current = node.querySelector(".meta-current .money-value");
      const discounted = node.querySelector(".meta-discounted .money-value");

      if (currentVal === null || discountedVal === null || Math.floor(currentVal) === Math.floor(discountedVal)) {
        current.textContent = "";
        discounted.textContent = "";
        node.classList.remove("show");
        return;
      }

      current.textContent = formatNum(currentVal);
      discounted.textContent = formatNum(discountedVal);
      node.classList.add("show");
    }

    function syncPair(aId, bId, mult){
      if (taxMode === "margin") return;
      if (lastEdited === aId && raw(aId).trim() === "") { clear([bId]); return; }
      if (lastEdited === bId && raw(bId).trim() === "") { clear([aId]); return; }
      const a = num(aId); const b = num(bId);
      if (lastEdited === bId && b !== null) setVal(aId, b * mult);
      else if (lastEdited === aId && a !== null) setVal(bId, a / mult);
      else {
        if (a === null && b !== null) setVal(aId, b * mult);
        if (b === null && a !== null) setVal(bId, a / mult);
      }
    }

    function captureMarginLock(){
      if (lastEdited === "mPct") {
        if (!hasVal("mPct") || raw("mPct").trim() === "-") { marginLock = null; return; }
        const p = num("mPct"); if (p === null) return;
        marginLock = { mode:"pct", value: clamp(p,0,99) };
      }
      if (lastEdited === "mEur") {
        if (!hasVal("mEur") || raw("mEur").trim() === "-") { marginLock = null; return; }
        const e = num("mEur"); if (e === null) return;
        marginLock = { mode:"eur", value: Math.max(e,0) };
      }
    }

    function unlockMarginIfNeeded(){
      if (["purchaseEx","purchaseIn","sellIn","sellEx","discPct","discEur","pDiscPct","pDiscEur"].includes(lastEdited)) marginLock = null;
    }

    function updateModeVisuals(){
      el("modeVat").classList.toggle("active", taxMode === "vat");
      el("modeMargin").classList.toggle("active", taxMode === "margin");
    }

    function updateRequiredFields(){
      const purchaseExWrap = el("purchaseExWrap");
      const purchaseInWrap = el("purchaseInWrap");
      const sellExWrap = el("sellExWrap");
      const sellInWrap = el("sellInWrap");
      const sellGrid = el("sellGrid");
      const purchaseGrid = el("purchaseGrid");

      [purchaseExWrap, purchaseInWrap, sellExWrap, sellInWrap].forEach(node => {
        node.classList.remove("main", "hidden");
      });

      if (taxMode === "margin") {
        purchaseExWrap.classList.add("main");
        sellExWrap.classList.add("main");
        purchaseInWrap.classList.add("hidden");
        sellInWrap.classList.add("hidden");
        sellGrid.style.gridTemplateColumns = "1fr";
        purchaseGrid.style.gridTemplateColumns = "1fr";
      } else {
        purchaseExWrap.classList.add("main");
        sellInWrap.classList.add("main");
        sellGrid.style.gridTemplateColumns = "1fr 1fr";
        purchaseGrid.style.gridTemplateColumns = "1fr 1fr";
      }
    }

    function getPurchaseBaseEx(){ const ex=num("purchaseEx"); const inc=num("purchaseIn"); if (ex!==null) return ex; return inc!==null ? inc/VAT : null; }
    function getPurchaseBaseIn(){ const ex=num("purchaseEx"); const inc=num("purchaseIn"); if (taxMode==="margin") return null; if (inc!==null) return inc; return ex!==null ? ex*VAT : null; }
    function getSellBaseEx(){ const ex=num("sellEx"); const inc=num("sellIn"); if (ex!==null) return ex; return inc!==null ? inc/VAT : null; }
    function getSellBaseIn(){ const ex=num("sellEx"); const inc=num("sellIn"); if (taxMode==="margin") return null; if (inc!==null) return inc; return ex!==null ? ex*VAT : null; }
    function getBasePurchaseValue(){ return taxMode === "margin" ? getPurchaseBaseEx() : getPurchaseBaseIn(); }
    function getBaseSellValue(){ return taxMode === "margin" ? getSellBaseEx() : getSellBaseIn(); }

    function getDiscountedPurchaseEx(){
      const baseEx = getPurchaseBaseEx(); if (baseEx===null) return null;
      if (hasVal("pDiscPct")) { const p=num("pDiscPct"); if (p!==null) return Math.max(baseEx*(1-clamp(p,0,99)/100),0); }
      if (hasVal("pDiscEur")) { const e=num("pDiscEur"); if (e!==null) return Math.max(baseEx-(taxMode==="margin"?Math.max(e,0):Math.max(e,0)/VAT),0); }
      return baseEx;
    }
    function getDiscountedPurchaseIn(){
      const baseIn = getPurchaseBaseIn(); if (baseIn===null) return null;
      if (hasVal("pDiscPct")) { const p=num("pDiscPct"); if (p!==null) return Math.max(baseIn*(1-clamp(p,0,99)/100),0); }
      if (hasVal("pDiscEur")) { const e=num("pDiscEur"); if (e!==null) return Math.max(baseIn-Math.max(e,0),0); }
      return baseIn;
    }
    function getDiscountedSellEx(){
      const baseEx = getSellBaseEx(); if (baseEx===null) return null;
      if (hasVal("discPct")) { const p=num("discPct"); if (p!==null) return Math.max(baseEx*(1-clamp(p,0,99)/100),0); }
      if (hasVal("discEur")) { const e=num("discEur"); if (e!==null) return Math.max(baseEx-(taxMode==="margin"?Math.max(e,0):Math.max(e,0)/VAT),0); }
      return baseEx;
    }
    function getDiscountedSellIn(){
      const baseIn = getSellBaseIn(); if (baseIn===null) return null;
      if (hasVal("discPct")) { const p=num("discPct"); if (p!==null) return Math.max(baseIn*(1-clamp(p,0,99)/100),0); }
      if (hasVal("discEur")) { const e=num("discEur"); if (e!==null) return Math.max(baseIn-Math.max(e,0),0); }
      return baseIn;
    }

    function setTaxMode(mode){
      const nextMode = mode === "margin" ? "margin" : "vat";
      if (taxMode === nextMode) return;
      taxMode = nextMode;
      updateModeVisuals();
      if (taxMode === "margin") {
        clear(["purchaseIn","sellIn"]);
      } else {
        const purchaseEx=num("purchaseEx"), sellEx=num("sellEx");
        if (purchaseEx!==null) setVal("purchaseIn", purchaseEx*VAT);
        if (sellEx!==null) setVal("sellIn", sellEx*VAT);
      }
      clear(["discPct","discEur","pDiscPct","pDiscEur"]);
      updateRequiredFields();
      saveToLocal();
      recalc();
    }

    function syncPurchaseDiscountFields(){
      const basePurchase = getBasePurchaseValue();
      if (["pDiscPct","pDiscEur"].includes(lastEdited) && !hasVal(lastEdited)) { clear(["pDiscPct","pDiscEur"]); return; }
      if (!basePurchase || basePurchase <= 0) { if (["pDiscPct","pDiscEur"].includes(lastEdited)) clear(["pDiscPct","pDiscEur"]); return; }
      if (lastEdited === "pDiscPct") {
        const pct=num("pDiscPct"); if (pct===null) return;
        const p=clamp(pct,0,99), eur=basePurchase*(p/100);
        setVal("pDiscPct",p); setVal("pDiscEur",eur);
      }
      if (lastEdited === "pDiscEur") {
        const eur=num("pDiscEur"); if (eur===null) return;
        const e=Math.max(eur,0), pct=basePurchase>0?(e/basePurchase)*100:0;
        setVal("pDiscEur",e); setVal("pDiscPct",clamp(pct,0,99));
      }
    }

    function syncDiscountFields(){
      const baseSell = getBaseSellValue();
      if (["discPct","discEur"].includes(lastEdited) && !hasVal(lastEdited)) { clear(["discPct","discEur"]); return; }
      if (!baseSell || baseSell <= 0) { if (["discPct","discEur"].includes(lastEdited)) clear(["discPct","discEur"]); return; }
      if (lastEdited === "discPct") {
        const pct=num("discPct"); if (pct===null) return;
        const p=clamp(pct,0,99), eur=baseSell*(p/100);
        setVal("discPct",p); setVal("discEur",eur);
      }
      if (lastEdited === "discEur") {
        const eur=num("discEur"); if (eur===null) return;
        const e=Math.max(eur,0), pct=baseSell>0?(e/baseSell)*100:0;
        setVal("discEur",e); setVal("discPct",clamp(pct,0,99));
      }
    }

    function updatePurchaseMeta(){
      const originalEx = getPurchaseBaseEx();
      const originalIn = getPurchaseBaseIn();
      const discountedEx = getDiscountedPurchaseEx();
      const discountedIn = getDiscountedPurchaseIn();
      const discountOn = hasVal("pDiscPct") || hasVal("pDiscEur");
      if (!discountOn) { setMeta("purchaseExMeta", null, null); setMeta("purchaseInMeta", null, null); return; }
      setMeta("purchaseExMeta", originalEx, discountedEx);
      setMeta("purchaseInMeta", originalIn, discountedIn);
    }

    function updateSellMeta(){
      const originalEx = getSellBaseEx();
      const originalIn = getSellBaseIn();
      const discountedEx = getDiscountedSellEx();
      const discountedIn = getDiscountedSellIn();
      const discountOn = hasVal("discPct") || hasVal("discEur");
      if (!discountOn) { setMeta("sellExMeta", null, null); setMeta("sellInMeta", null, null); return; }
      setMeta("sellExMeta", originalEx, discountedEx);
      setMeta("sellInMeta", originalIn, discountedIn);
    }

    function updateDiscountPanels(){
      const purchaseHasValue = hasVal("pDiscPct") || hasVal("pDiscEur");
      const sellHasValue = hasVal("discPct") || hasVal("discEur");
      const anyHasValue = purchaseHasValue || sellHasValue;
      el("discountToggle").classList.toggle("has-value", anyHasValue);
      const open = anyHasValue || discountManualOpen;
      el("discountShell").classList.toggle("show", open);
      el("discountToggle").classList.toggle("active", open);
    }

    function setMarginDash(){ setText("mPct","-"); setText("mEur","-"); }

    function applyMarginIfPossible(){
      const purchaseEx = getDiscountedPurchaseEx();
      if (!purchaseEx || purchaseEx <= 0 || !marginLock) return;
      clear(["discPct","discEur"]);
      if (marginLock.mode === "pct") {
        const p=clamp(marginLock.value,0,99), net=purchaseEx/(1-(p/100)), profit=net-purchaseEx;
        setVal("sellEx",net); if (taxMode==="vat") setVal("sellIn",net*VAT);
        setText("mEur",Math.floor(profit)); setText("mPct",Math.floor(p));
      } else {
        const profit=Math.max(marginLock.value,0), net=purchaseEx+profit, pct=net>0?(profit/net)*100:0;
        setVal("sellEx",net); if (taxMode==="vat") setVal("sellIn",net*VAT);
        setText("mPct",Math.floor(clamp(pct,0,99))); setText("mEur",Math.floor(profit));
      }
    }

    function updateMarginFromCurrent(){
      if (lastEdited === "mPct" || lastEdited === "mEur") return;
      const purchaseEx=getDiscountedPurchaseEx(), discountedSellEx=getDiscountedSellEx();
      if (!purchaseEx || !discountedSellEx || purchaseEx<=0) { clear(["mPct","mEur"]); return; }
      const net=discountedSellEx; if (!(net>0)) { clear(["mPct","mEur"]); return; }
      const profit=net-purchaseEx, pct=(profit/net)*100;
      if (profit<=0 || pct<=0) { setMarginDash(); return; }
      setText("mPct", String(Math.floor(clamp(pct,0,99))));
      setText("mEur", String(Math.floor(profit)));
    }

    function recalc(){
      if (updating) return;
      updating = true;
      syncPair("purchaseIn","purchaseEx",VAT);
      syncPair("sellIn","sellEx",VAT);
      unlockMarginIfNeeded();
      captureMarginLock();
      if (["mPct","mEur"].includes(lastEdited)) {
        applyMarginIfPossible();
        syncPair("sellIn","sellEx",VAT);
      }
      syncPurchaseDiscountFields();
      syncDiscountFields();
      updatePurchaseMeta();
      updateSellMeta();
      updateDiscountPanels();
      updateMarginFromCurrent();
      updating = false;
    }

    function bind(id){
      const input = el(id); if (!input) return;
      input.addEventListener("input", ()=>{ lastEdited=id; recalc(); queueSave(); });
      input.addEventListener("focus", ()=>{ setTimeout(()=>{ try{input.select();}catch(e){} },0); });
    }

    function setPrices({ purchaseEx=null, purchaseIn=null, pDiscPct=null, pDiscEur=null, sellIn=null, sellEx=null, discPct=null, discEur=null } = {}){
      updating = true;
      if (purchaseEx !== null) el("purchaseEx").value = ceilOrEmpty(purchaseEx);
      if (purchaseIn !== null) el("purchaseIn").value = ceilOrEmpty(purchaseIn);
      if (pDiscPct !== null) el("pDiscPct").value = floorOrEmpty(pDiscPct);
      if (pDiscEur !== null) el("pDiscEur").value = floorOrEmpty(pDiscEur);
      if (sellIn !== null) el("sellIn").value = floorOrEmpty(sellIn);
      if (sellEx !== null) el("sellEx").value = floorOrEmpty(sellEx);
      if (discPct !== null) el("discPct").value = floorOrEmpty(discPct);
      if (discEur !== null) el("discEur").value = floorOrEmpty(discEur);
      marginLock = null; lastEdited = null;
      if (taxMode === "vat") {
        syncPair("purchaseIn","purchaseEx",VAT);
        syncPair("sellIn","sellEx",VAT);
      }
      updating = false;
      lastEdited = taxMode === "margin" ? "sellEx" : "sellIn";
      recalc();
    }

    function loadFromQueryString(){
      const qs = new URLSearchParams(window.location.search);
      const p=qs.get("p"), pi=qs.get("pi"), pdp=qs.get("pdp"), pde=qs.get("pde"), s=qs.get("s"), se=qs.get("se"), dp=qs.get("dp"), de=qs.get("de"), tm=qs.get("tm");
      if (tm === "vat" || tm === "margin") taxMode = tm;
      updateModeVisuals(); updateRequiredFields();
      const obj = {};
      if (p) obj.purchaseEx=parseFloat(p);
      if (pi) obj.purchaseIn=parseFloat(pi);
      if (pdp) obj.pDiscPct=parseFloat(pdp);
      if (pde) obj.pDiscEur=parseFloat(pde);
      if (s) obj.sellIn=parseFloat(s);
      if (se) obj.sellEx=parseFloat(se);
      if (dp) obj.discPct=parseFloat(dp);
      if (de) obj.discEur=parseFloat(de);
      if (Object.keys(obj).length) setPrices(obj);
    }

    function saveToLocal(){
      const data = {
        purchaseEx: raw("purchaseEx"), purchaseIn: raw("purchaseIn"), pDiscPct: raw("pDiscPct"), pDiscEur: raw("pDiscEur"),
        sellIn: raw("sellIn"), sellEx: raw("sellEx"), discPct: raw("discPct"), discEur: raw("discEur"), taxMode, discountManualOpen
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }
    function queueSave(){ clearTimeout(window.__saveT); window.__saveT = setTimeout(saveToLocal, 120); }

    function loadFromLocal(){
      try {
        const s = localStorage.getItem(STORAGE_KEY); if (!s) return false;
        const data = JSON.parse(s);
        if (data.taxMode === "vat" || data.taxMode === "margin") taxMode = data.taxMode;
        discountManualOpen = !!data.discountManualOpen;
        updateModeVisuals(); updateRequiredFields();
        const any=["purchaseEx","purchaseIn","pDiscPct","pDiscEur","sellIn","sellEx","discPct","discEur"].some(k => (data[k] ?? "").toString().trim() !== "");
        if (!any) return false;
        setPrices({
          purchaseEx: data.purchaseEx !== "" ? parseFloat(data.purchaseEx) : null,
          purchaseIn: data.purchaseIn !== "" ? parseFloat(data.purchaseIn) : null,
          pDiscPct: data.pDiscPct !== "" ? parseFloat(data.pDiscPct) : null,
          pDiscEur: data.pDiscEur !== "" ? parseFloat(data.pDiscEur) : null,
          sellIn: data.sellIn !== "" ? parseFloat(data.sellIn) : null,
          sellEx: data.sellEx !== "" ? parseFloat(data.sellEx) : null,
          discPct: data.discPct !== "" ? parseFloat(data.discPct) : null,
          discEur: data.discEur !== "" ? parseFloat(data.discEur) : null
        });
        return true;
      } catch { return false; }
    }

    function resetAll(){
      updating = true;
      ["purchaseEx","purchaseIn","pDiscPct","pDiscEur","sellIn","sellEx","discPct","discEur","mPct","mEur"].forEach(id => el(id).value = "");
      marginLock = null; lastEdited = null; discountManualOpen = false; updating = false;
      localStorage.removeItem(STORAGE_KEY);
      setMeta("purchaseExMeta", null, null); setMeta("purchaseInMeta", null, null); setMeta("sellExMeta", null, null); setMeta("sellInMeta", null, null);
      updateRequiredFields(); recalc();
    }

    window.addEventListener("DOMContentLoaded", ()=>{
      ["purchaseEx","purchaseIn","pDiscPct","pDiscEur","sellIn","sellEx","discPct","discEur","mPct","mEur"].forEach(bind);
      el("modeVat").addEventListener("click", ()=>setTaxMode("vat"));
      el("modeMargin").addEventListener("click", ()=>setTaxMode("margin"));
      el("resetBtn").addEventListener("click", resetAll);
      el("discountToggle").addEventListener("click", ()=>{
        const willOpen = !el("discountShell").classList.contains("show");
        discountManualOpen = willOpen;
        if (!willOpen) {
          clear(["pDiscPct","pDiscEur","discPct","discEur"]);
          lastEdited = "pDiscPct";
          recalc();
        } else {
          updateDiscountPanels();
        }
        queueSave();
      });
      updateModeVisuals(); updateRequiredFields();
      const loadedLocal = loadFromLocal();
      loadFromQueryString();
      if (!loadedLocal && !window.location.search) recalc();
      window.setPrices = setPrices;
    });
  </script>
</body>
</html>
